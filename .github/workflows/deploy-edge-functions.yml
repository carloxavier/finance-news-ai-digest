name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      function:
        description: 'Function name, or "all"'
        required: true
        default: 'all'
      ref:
        description: 'Git ref to deploy (commit SHA or branch). Leave blank for the workflow''s default ref.'
        required: false
        default: ''

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.resolve.outputs.functions }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          # paths-filter needs history to compute the diff against the parent commit.
          fetch-depth: 0

      - id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            send-digest: 'supabase/functions/send-digest/**'
            send-welcome: 'supabase/functions/send-welcome/**'
            track-click: 'supabase/functions/track-click/**'
            digest-webhook: 'supabase/functions/digest-webhook/**'
            handle-unsubscribe: 'supabase/functions/handle-unsubscribe/**'
            _shared: 'supabase/functions/_shared/**'

      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_FUNCTION: ${{ inputs.function }}
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          set -euo pipefail

          # Consumers of supabase/functions/_shared/. When _shared changes,
          # every consumer needs redeploying. Update this list if another
          # function starts importing from _shared.
          SHARED_CONSUMERS='["send-digest","send-welcome"]'

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_FUNCTION" == "all" ]]; then
              # Enumerate every function folder except _shared.
              FUNCTIONS=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d \
                ! -name '_*' -printf '%f\n' | jq -Rsc 'split("\n") | map(select(length > 0))')
            else
              FUNCTIONS=$(jq -cn --arg f "$INPUT_FUNCTION" '[$f]')
            fi
          else
            # Push event. steps.filter.outputs.changes is a JSON array of
            # filter names that matched.
            CHANGES_JSON="${CHANGES:-[]}"
            FUNCTIONS=$(echo "$CHANGES_JSON" | jq -c --argjson consumers "$SHARED_CONSUMERS" '
              if any(. == "_shared")
              then (. - ["_shared"]) + $consumers | unique
              else . - ["_shared"]
              end
            ')
          fi

          echo "functions=$FUNCTIONS" >> "$GITHUB_OUTPUT"
          echo "Will deploy: $FUNCTIONS"

  deploy:
    needs: detect
    if: needs.detect.outputs.functions != '[]' && needs.detect.outputs.functions != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJSON(needs.detect.outputs.functions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pre-deploy check (tests)
        run: ./scripts/pre-deploy-check.sh ${{ matrix.function }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ${{ matrix.function }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ${{ matrix.function }} \
            --project-ref kamfamwjswkncftsdgxi \
            --no-verify-jwt
